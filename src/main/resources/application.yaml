spring:
  application:
    name: fitnessAPI

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mvc:
    servlet:
      path: /api/v1

app:
  i18n:
    basename: classpath:i18n/messages/messages,classpath:i18n/errors/errors,classpath:i18n/validations/validations
    encoding: UTF-8
    fallback-to-system-locale: false
    cache-seconds: 0
  security:
    cookie:
      secure: false
      max-age: ${REFRESH_TTL}
      same-site: Lax
      cookie-name: refresh_token
      path: /api/v1/auth/refresh
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration: 15m
    refresh-token:
      ttl: ${REFRESH_TTL}
      pepper: ${REFRESH_PEPPER}
      length: 64
    session:
      max-sessions: 5